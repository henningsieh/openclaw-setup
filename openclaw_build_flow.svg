<svg width="100%" viewBox="0 0 920 760" role="img" xmlns="http://www.w3.org/2000/svg">
<title>OpenClaw build flow - docker-compose.yml, Dockerfile.gateway, openclaw-init.sh</title>
<desc>Diagram showing how docker-compose.yml drives the build, how Dockerfile.gateway bakes openclaw-init.sh into the image, and how the runtime container uses the entrypoint and mounted host volume.</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    text {
      font-family: "Anthropic Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      fill: rgb(211, 209, 199);
    }
    .phase {
      font-size: 11px;
      opacity: 0.55;
      letter-spacing: 0.07em;
      fill: rgb(194, 192, 182);
    }
    .title {
      font-size: 14px;
      font-weight: 600;
    }
    .body {
      font-size: 11px;
    }
    .muted {
      font-size: 11px;
      opacity: 0.68;
    }
    .note-title {
      font-size: 12px;
      opacity: 0.75;
    }
    .arrow {
      fill: none;
      stroke: rgb(156, 154, 146);
      stroke-width: 1.5;
      marker-end: url(#arrow);
    }
    .cross {
      fill: none;
      stroke: rgba(222, 220, 209, 0.35);
      stroke-width: 1.2;
      stroke-dasharray: 5 3;
      marker-end: url(#arrow);
    }
  </style>
</defs>

<rect x="24" y="18" width="872" height="724" rx="14" fill="rgb(24, 24, 22)" stroke="rgba(222, 220, 209, 0.12)" stroke-width="1"/>

<text x="170" y="48" text-anchor="middle" class="phase">CONFIG</text>
<text x="460" y="48" text-anchor="middle" class="phase">BUILD</text>
<text x="750" y="48" text-anchor="middle" class="phase">RUNTIME</text>

<line x1="315" y1="34" x2="315" y2="630" stroke="rgba(222, 220, 209, 0.15)" stroke-width="1" stroke-dasharray="4 4"/>
<line x1="605" y1="34" x2="605" y2="630" stroke="rgba(222, 220, 209, 0.15)" stroke-width="1" stroke-dasharray="4 4"/>

<g>
  <rect x="50" y="72" width="240" height="118" rx="10" fill="rgb(12, 68, 124)" stroke="rgb(133, 183, 235)" stroke-width="0.5"/>
  <text x="68" y="98" class="title" fill="rgb(181, 212, 244)">docker-compose.yml</text>
  <text x="68" y="122" class="body" fill="rgb(133, 183, 235)">
    <tspan x="68" dy="0">defines x-common-build</tspan>
    <tspan x="68" dy="17">passes build args and image tag</tspan>
    <tspan x="68" dy="17">wires ports, volumes, env,</tspan>
    <tspan x="68" dy="17">restart policy, and healthcheck</tspan>
  </text>
</g>

<g>
  <rect x="50" y="232" width="240" height="96" rx="10" fill="rgb(8, 80, 65)" stroke="rgb(93, 202, 165)" stroke-width="0.5"/>
  <text x="68" y="258" class="title" fill="rgb(159, 225, 203)">.env inputs</text>
  <text x="68" y="282" class="body" fill="rgb(93, 202, 165)">
    <tspan x="68" dy="0">OPENCLAW_VERSION, GO_VERSION,</tspan>
    <tspan x="68" dy="17">paths, ports, tokens,</tspan>
    <tspan x="68" dy="17">and optional base-image override</tspan>
  </text>
</g>

<g>
  <rect x="340" y="72" width="240" height="136" rx="10" fill="rgb(60, 52, 137)" stroke="rgb(175, 169, 236)" stroke-width="0.5"/>
  <text x="358" y="98" class="title" fill="rgb(206, 203, 246)">Dockerfile.gateway</text>
  <text x="358" y="122" class="body" fill="rgb(175, 169, 236)">
    <tspan x="358" dy="0">FROM ${OPENCLAW_BASE_IMAGE}</tspan>
    <tspan x="358" dy="17">:${OPENCLAW_VERSION}</tspan>
    <tspan x="358" dy="17">installs packages, Go, npm tools,</tspan>
    <tspan x="358" dy="17">Chrome, and seed skills</tspan>
  </text>
  <text x="358" y="190" class="muted" fill="rgb(175, 169, 236)">
    <tspan x="358" dy="0">COPY openclaw-init.sh -&gt;</tspan>
    <tspan x="358" dy="17">/usr/local/bin/openclaw-entrypoint.sh</tspan>
    <tspan x="358" dy="17">ENTRYPOINT points at that script</tspan>
  </text>
</g>

<g>
  <rect x="340" y="246" width="240" height="92" rx="10" fill="rgb(68, 68, 65)" stroke="rgb(180, 178, 169)" stroke-width="0.5"/>
  <text x="358" y="272" class="title">built image</text>
  <text x="358" y="296" class="body">
    <tspan x="358" dy="0">${OPENCLAW_IMAGE}:${OPENCLAW_VERSION}</tspan>
    <tspan x="358" dy="17">contains tools, Chrome, seed skills,</tspan>
    <tspan x="358" dy="17">and the custom entrypoint</tspan>
  </text>
</g>

<g>
  <rect x="630" y="72" width="240" height="118" rx="10" fill="rgb(99, 56, 6)" stroke="rgb(239, 159, 39)" stroke-width="0.5"/>
  <text x="648" y="98" class="title" fill="rgb(250, 199, 117)">openclaw-init.sh</text>
  <text x="648" y="122" class="body" fill="rgb(239, 159, 39)">
    <tspan x="648" dy="0">runs as container entrypoint</tspan>
    <tspan x="648" dy="17">seeds skills, merges lock,</tspan>
    <tspan x="648" dy="17">bootstraps browser config,</tspan>
    <tspan x="648" dy="17">then execs upstream startup</tspan>
  </text>
</g>

<g>
  <rect x="630" y="246" width="240" height="108" rx="10" fill="rgb(68, 68, 65)" stroke="rgb(180, 178, 169)" stroke-width="0.5"/>
  <text x="648" y="272" class="title">running gateway container</text>
  <text x="648" y="296" class="body">
    <tspan x="648" dy="0">node dist/index.js gateway ...</tspan>
    <tspan x="648" dy="17">published on ${OPENCLAW_GATEWAY_PORT}</tspan>
  </text>
  <text x="648" y="330" class="muted">
    <tspan x="648" dy="0">healthcheck probes /healthz on</tspan>
    <tspan x="648" dy="17">127.0.0.1 inside the container</tspan>
  </text>
</g>

<g>
  <rect x="630" y="404" width="240" height="94" rx="10" fill="rgb(39, 80, 10)" stroke="rgb(151, 196, 89)" stroke-width="0.5"/>
  <text x="648" y="430" class="title" fill="rgb(192, 221, 151)">host-mounted state</text>
  <text x="648" y="454" class="body" fill="rgb(151, 196, 89)">
    <tspan x="648" dy="0">/root/.openclaw -&gt; /home/node/.openclaw</tspan>
    <tspan x="648" dy="17">workspace, config, and skills</tspan>
    <tspan x="648" dy="17">persist across rebuilds</tspan>
  </text>
</g>

<g>
  <rect x="340" y="404" width="240" height="94" rx="10" fill="rgb(122, 45, 45)" stroke="rgb(229, 146, 146)" stroke-width="0.5"/>
  <text x="358" y="430" class="title" fill="rgb(242, 198, 198)">openclaw-cli service</text>
  <text x="358" y="454" class="body" fill="rgb(229, 146, 146)">
    <tspan x="358" dy="0">same image and same mounted volumes</tspan>
    <tspan x="358" dy="17">reuses gateway network namespace</tspan>
  </text>
  <text x="358" y="488" class="muted" fill="rgb(229, 146, 146)">network_mode: service:openclaw-gateway</text>
</g>

<line x1="290" y1="131" x2="338" y2="131" class="arrow"/>
<line x1="170" y1="232" x2="170" y2="192" class="arrow"/>
<line x1="460" y1="208" x2="460" y2="244" class="arrow"/>
<line x1="580" y1="131" x2="628" y2="131" class="arrow"/>
<line x1="750" y1="190" x2="750" y2="244" class="arrow"/>
<line x1="750" y1="354" x2="750" y2="402" class="arrow"/>
<line x1="460" y1="338" x2="460" y2="402" class="arrow"/>

<path d="M290 286 C318 286 324 292 340 292" class="cross"/>

<path d="M580 292 C618 292 622 292 630 292" class="cross"/>

<path d="M580 452 C620 452 624 452 630 452" class="cross"/>

<path d="M750 402 C750 382 750 376 750 354" class="cross"/>

<rect x="50" y="552" width="820" height="150" rx="10" fill="rgb(38, 38, 36)" stroke="rgba(222, 220, 209, 0.15)" stroke-width="0.5"/>
<text x="68" y="580" class="note-title">How the three files fit together:</text>
<text x="68" y="606" class="body">
  <tspan x="68" dy="0">1. docker-compose.yml is the top-level contract: it chooses the image name, passes build args into Dockerfile.gateway,</tspan>
  <tspan x="68" dy="18">   and mounts the live host state used by both services.</tspan>
</text>
<text x="68" y="646" class="body">
  <tspan x="68" dy="0">2. Dockerfile.gateway produces the image and embeds openclaw-init.sh as the entrypoint that always runs first</tspan>
  <tspan x="68" dy="18">   when the container starts.</tspan>
</text>
<text x="68" y="686" class="body">
  <tspan x="68" dy="0">3. openclaw-init.sh prepares the live ~/.openclaw directory, then hands off to upstream OpenClaw startup so the</tspan>
  <tspan x="68" dy="18">   gateway and CLI both see the same persisted state.</tspan>
</text>
</svg>