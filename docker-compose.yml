services:
  openclaw-gateway:
    image: ${OPENCLAW_IMAGE}:${OPENCLAW_VERSION}
    build:
      context: .
      dockerfile: Dockerfile.gateway
      args:
        OPENCLAW_VERSION: ${OPENCLAW_VERSION}
        OPENCLAW_BASE_IMAGE: ${OPENCLAW_BASE_IMAGE:-ghcr.io/openclaw/openclaw}
        GO_VERSION: ${GO_VERSION}
        QCARD_VERSION: ${QCARD_VERSION}
        CLAWHUB_CLI_VERSION: ${CLAWHUB_CLI_VERSION}
        BROWSER_USE_VERSION: ${BROWSER_USE_VERSION}
        AGENT_BROWSER_CLAWDBOT_VERSION: ${AGENT_BROWSER_CLAWDBOT_VERSION}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - HOME=/home/node
      - NODE_ENV=production
      - NODE_COMPILE_CACHE=${NODE_COMPILE_CACHE}/${OPENCLAW_VERSION}
      - TERM=xterm-256color
      - PATH=/home/node/.local/bin:/home/node/go/bin:/home/linuxbrew/.linuxbrew/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    volumes:
      - ${OPENCLAW_CONFIG_DIR}:/home/node/.openclaw
      - ${OPENCLAW_WORKSPACE_DIR}:/home/node/.openclaw/workspace
      - ${NODE_COMPILE_CACHE}/${OPENCLAW_VERSION}:${NODE_COMPILE_CACHE}/${OPENCLAW_VERSION}
    shm_size: '2gb'
    ports:
      - "${OPENCLAW_GATEWAY_PORT}:18789"
    networks:
      default: {}
      web_traffic:
        aliases:
          - openclaw-gateway
    # Security note: cap_drop and no-new-privileges are intentionally omitted
    # on the gateway (unlike openclaw-cli) because it binds a host port and
    # runs the long-lived process. Harden further once port binding is confirmed
    # to work without NET_BIND_SERVICE.
    command:
      [
        "node",
        "dist/index.js",
        "gateway",
        "--bind",
        "${OPENCLAW_GATEWAY_BIND:-lan}",
        "--port",
        "${OPENCLAW_GATEWAY_PORT:-18789}",
        "--allow-unconfigured",
      ]
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:${OPENCLAW_GATEWAY_PORT:-18789}/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  openclaw-cli:
    image: ${OPENCLAW_IMAGE}:${OPENCLAW_VERSION}
    build:
      context: .
      dockerfile: Dockerfile.gateway
      args:
        OPENCLAW_VERSION: ${OPENCLAW_VERSION}
        OPENCLAW_BASE_IMAGE: ${OPENCLAW_BASE_IMAGE:-ghcr.io/openclaw/openclaw}
        GO_VERSION: ${GO_VERSION}
        QCARD_VERSION: ${QCARD_VERSION}
        CLAWHUB_CLI_VERSION: ${CLAWHUB_CLI_VERSION}
        BROWSER_USE_VERSION: ${BROWSER_USE_VERSION}
        AGENT_BROWSER_CLAWDBOT_VERSION: ${AGENT_BROWSER_CLAWDBOT_VERSION}
    network_mode: "service:openclaw-gateway"
    env_file:
      - .env
    environment:
      - HOME=/home/node
      - NODE_ENV=production
      - NODE_COMPILE_CACHE=${NODE_COMPILE_CACHE:-/var/tmp/openclaw-compile-cache}/${OPENCLAW_VERSION}
      - TERM=xterm-256color
      - GITHUB_TOKEN=${GITHUB_PERSONAL_TOKEN}
      - PATH=/home/node/.local/bin:/home/node/go/bin:/home/linuxbrew/.linuxbrew/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      - OPENCLAW_BUNDLED_PLUGINS_DIR=/app/dist/extensions
    volumes:
      - ${OPENCLAW_CONFIG_DIR}:/home/node/.openclaw
      - ${OPENCLAW_WORKSPACE_DIR}:/home/node/.openclaw/workspace
      - ${NODE_COMPILE_CACHE:-/var/tmp/openclaw-compile-cache}/${OPENCLAW_VERSION}:${NODE_COMPILE_CACHE:-/var/tmp/openclaw-compile-cache}/${OPENCLAW_VERSION}
    profiles:
      - cli
    entrypoint: ["node", "dist/index.js"]
    cap_drop:
      - NET_RAW
      - NET_ADMIN
    security_opt:
      - no-new-privileges:true

networks:
  web_traffic:
    external: true
