services:
  keyring-init:
    image: ${OPENCLAW_IMAGE}
    user: "0:0"
    entrypoint: ["sh"]
    command:
      [
        "-lc",
        "mkdir -p /home/node/.local/share/keyrings && chown -R 1000:1000 /home/node/.local/share/keyrings && chmod 700 /home/node/.local/share/keyrings",
      ]
    volumes:
      - sog_keyring:/home/node/.local/share/keyrings
    network_mode: none
    restart: "no"

  openclaw-gateway:
    image: ${OPENCLAW_IMAGE}
    build:
      context: .
      dockerfile: Dockerfile.gateway
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - HOME=/home/node
      - NODE_ENV=production
      - NODE_COMPILE_CACHE=${NODE_COMPILE_CACHE:-/var/tmp/openclaw-compile-cache}
      - TERM=xterm-256color
      - OPENCLAW_NO_RESPAWN=${OPENCLAW_NO_RESPAWN}
      - OPENCLAW_GATEWAY_BIND=${OPENCLAW_GATEWAY_BIND}
      - OPENCLAW_GATEWAY_PORT=${OPENCLAW_GATEWAY_PORT}
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN}
      - GATEWAY_AUTH_PASSWORD=${GATEWAY_AUTH_PASSWORD}
      - GOG_KEYRING_PASSWORD=${GOG_KEYRING_PASSWORD}
      - XDG_CONFIG_HOME=${XDG_CONFIG_HOME:-/home/node/.config}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - COPILOT_GITHUB_TOKEN=${COPILOT_GITHUB_TOKEN}
      - PATH=/home/node/go/bin:/home/linuxbrew/.linuxbrew/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      - OPENCLAW_BUNDLED_PLUGINS_DIR=/app/dist/extensions
    volumes:
      - ${OPENCLAW_CONFIG_DIR}:/home/node/.openclaw
      - ${OPENCLAW_WORKSPACE_DIR}:/home/node/.openclaw/workspace
      - ${NODE_COMPILE_CACHE:-/var/tmp/openclaw-compile-cache}:${NODE_COMPILE_CACHE:-/var/tmp/openclaw-compile-cache}
      - sog_keyring:/home/node/.local/share/keyrings
    ports:
      - "${OPENCLAW_GATEWAY_PORT}:18789"
    networks:
      default: {}
      web_traffic:
        aliases:
          - openclaw-gateway
    depends_on:
      keyring-init:
        condition: service_completed_successfully
    # Security note: cap_drop and no-new-privileges are intentionally omitted
    # on the gateway (unlike openclaw-cli) because it binds a host port and
    # runs the long-lived process. Harden further once port binding is confirmed
    # to work without NET_BIND_SERVICE.
    command:
      [
        "/usr/local/bin/openclaw-entrypoint.sh",
        "node",
        "openclaw.mjs",
        "gateway",
        "--bind",
        "${OPENCLAW_GATEWAY_BIND}",
        "--port",
        "${OPENCLAW_GATEWAY_PORT}",
        "--allow-unconfigured",
      ]

  openclaw-cli:
    image: ${OPENCLAW_IMAGE}
    build:
      context: .
      dockerfile: Dockerfile.gateway
    network_mode: "service:openclaw-gateway"
    env_file:
      - .env
    environment:
      - HOME=/home/node
      - NODE_ENV=production
      - NODE_COMPILE_CACHE=${NODE_COMPILE_CACHE:-/var/tmp/openclaw-compile-cache}
      - TERM=xterm-256color
      - PATH=/home/node/go/bin:/home/linuxbrew/.linuxbrew/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      - OPENCLAW_BUNDLED_PLUGINS_DIR=/app/dist/extensions
    volumes:
      - ${OPENCLAW_CONFIG_DIR}:/home/node/.openclaw
      - ${OPENCLAW_WORKSPACE_DIR}:/home/node/.openclaw/workspace
      - ${NODE_COMPILE_CACHE:-/var/tmp/openclaw-compile-cache}:${NODE_COMPILE_CACHE:-/var/tmp/openclaw-compile-cache}
      - sog_keyring:/home/node/.local/share/keyrings
    profiles:
      - cli
    depends_on:
      keyring-init:
        condition: service_completed_successfully
    entrypoint: ["node", "openclaw.mjs"]
    cap_drop:
      - NET_RAW
      - NET_ADMIN
    security_opt:
      - no-new-privileges:true

networks:
  web_traffic:
    external: true

volumes:
  sog_keyring:
